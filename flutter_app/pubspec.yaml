name: touchspeak_ai
description: Touch-based communication app for non-verbal individuals.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_tts: ^4.0.2
  geolocator: ^13.0.1
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
